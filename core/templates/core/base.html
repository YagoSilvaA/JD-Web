{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>{% block title %}Joseph Dager Alva – AHORA NACIÓN{% endblock %}</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <!-- Montserrat -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap">

  <!-- Favicon -->
  <link rel="icon" href="{% static 'core/img/favicon.ico' %}">

  <style>
    :root {
      --an-rojo: #CF2E26;
      --an-blanco: #ffffff;
      --an-negro: #111111;
      --an-gris: #f3f4f6;
    }

    body {
      font-family: 'Montserrat', system-ui, -apple-system, 'Segoe UI', sans-serif;
      background-color: var(--an-gris);
      color: var(--an-negro);
    }

    .navbar {
      background-color: var(--an-rojo) !important;
      padding-top: 0.25rem;

      padding-bottom: 0.25rem;
    }

    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 0.9rem;
    }

    .navbar-logo {
      height: 60px;
      display: inline-block;
      vertical-align: middle;
    }


    .navbar-nav .nav-link {
      color: var(--an-blanco) !important;
      font-weight: 600;
    }

    .navbar-nav .nav-link.active {
      text-decoration: underline;
      text-underline-offset: 4px;
    }

    .btn-primary {
      background-color: var(--an-rojo);
      border-color: var(--an-rojo);
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      border-radius: 12px;
      padding: 0.8rem 1.2rem;
    }

    .btn-primary:hover {
      background-color: #b4000f;
      border-color: #b4000f;
    }

    .hero-section {
      padding: 4rem 0 3rem;
    }

    .hero-card {
      background-color: var(--an-blanco);
      border-radius: 1rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      padding: 3rem;
    }

    .hero-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background-color: var(--an-rojo);
      color: var(--an-blanco);
      padding: 0.35rem 0.9rem;
      border-radius: 999px;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
    }

    .hero-tag img {
      height: 20px;
    }

    .hero-title {
      font-weight: 800;
      font-size: clamp(2.1rem, 3vw, 2.8rem);
    }

    .hero-subtitle {
      font-size: 1.05rem;
      color: #555;
      max-width: 34rem;
    }

    .hero-photo {
      border-radius: 1rem;
      overflow: hidden;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.12);
      height: 450px;
      /* altura fija para que el contenedor no cambie */
      background-color: #f3f4f6;
      /* opcional, sirve como fallback */
    }

    .hero-photo img {
      width: 100%;
      height: 100%;
      /* fuerza que la imagen llene todo el contenedor */
      object-fit: cover;
      /* recorta proporcionalmente si es necesario */
      object-position: center;
      /* centra el foco de la imagen */
      display: block;
    }

    .carousel-item img {
      width: 100%;
      height: 100%;
      /* fuerza que la imagen llene el contenedor */
      object-fit: cover;
      /* recorta proporcionalmente sin deformar */
      object-position: center ;
    }

    .pillars-section {
      margin-top: 2.5rem;
      margin-bottom: 2rem;
    }

    .pillar-card {
      background-color: var(--an-blanco);
      border-radius: 0.9rem;
      padding: 1.6rem 1.4rem;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
      height: 100%;
    }

    .pillar-icon {
      font-size: 1.8rem;
      color: var(--an-rojo);
      margin-bottom: 0.5rem;
    }

    footer {
      background-color: #ffffff;
      border-top: 4px solid var(--an-rojo);
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="{% url 'home' %}">
        <img src="{% static 'core/img/23-nav.jpg' %}" alt="Ahora Nación" class="navbar-logo me-2">
        <span>Joseph Dager Alva</span>
      </a>


      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Abrir menú">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link {% if request.resolver_match.url_name == 'about' %}active{% endif %}"
              href="{% url 'about' %}">
              Sobre Joseph
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link {% if request.resolver_match.url_name == 'proposals' %}active{% endif %}"
              href="{% url 'proposals' %}">
              Propuestas
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link {% if request.resolver_match.url_name == 'contact' %}active{% endif %}"
              href="{% url 'contact' %}">
              Contacto
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.resolver_match.url_name == 'publicaciones' %}active{% endif %}"
              href="{% url 'publicaciones' %}">
              Publicaciones
            </a>
          </li>


        </ul>
      </div>
    </div>
  </nav>

  <main class="container" style="padding-top: 5.2rem;">
    {% block content %}{% endblock %}
  </main>

  <footer class="mt-5 py-4">
    <div class="container text-center small">
      © 2025 Joseph Dager Alva – AHORA NACIÓN. Manos limpias para gobernar.
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
